name: Smart README Update

on:
  schedule:
    - cron: "0 */4 * * *"  # 6 times/day
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch quote
        run: |
          curl -s https://programming-quotesapi.vercel.app/api/random > quote.json
          QUOTE=$(jq -r '.en' quote.json)
          AUTHOR=$(jq -r '.author' quote.json)

          echo "> \"$QUOTE\" — $AUTHOR" > quote.txt

      - name: Update README
        run: |
          # Update quote
          awk '
          /## 💬 Dev Quote/ {print; getline; system("cat quote.txt"); next}
          1
          ' README.md > temp.md && mv temp.md README.md

          # Update timestamp
          sed -i "s|<!--LAST_UPDATED-->|Last update: $(date)|" README.md

      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --quiet && git diff --staged --quiet || git commit -m "Smart README update"

          git push

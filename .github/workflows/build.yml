name: Tieka Android Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-8.10.2
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          touch .env
          if [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}" ]; then
            echo "EXPO_PUBLIC_APPWRITE_ENDPOINT=${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}" >> .env
          fi
          if [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}" ]; then
            echo "EXPO_PUBLIC_APPWRITE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}" >> .env
          fi
          if [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}" ]; then
            echo "EXPO_PUBLIC_APPWRITE_DATABASE_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}" >> .env
          fi
          if [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_COLLECTION_ID }}" ]; then
            echo "EXPO_PUBLIC_APPWRITE_COLLECTION_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_COLLECTION_ID }}" >> .env
          fi
          echo "# build env" >> .env

      - name: Verify and fix Rubik fonts
        run: |
          FONTS=(
            "assets/fonts/Rubik-Bold.ttf"
            "assets/fonts/Rubik-ExtraBold.ttf"
            "assets/fonts/Rubik-Light.ttf"
            "assets/fonts/Rubik-Medium.ttf"
            "assets/fonts/Rubik-Regular.ttf"
            "assets/fonts/Rubik-SemiBold.ttf"
          )
          mkdir -p assets/fonts
          for font in "${FONTS[@]}"; do
            if [ -f "$font" ]; then
              echo "OK: $font"
            else
              echo "MISSING: $font - fetching substitute..."
              if curl -sL --max-time 15 "https://fonts.gstatic.com/s/rubik/v28/iJWZBXyIfDnIV5PNhY1KTN7Z-Yh-B4i1UA.ttf" -o "$font"; then
                echo "Downloaded: $font"
              elif cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf "$font"; then
                echo "Used DejaVu fallback: $font"
              else
                exit 1
              fi
            fi
          done

      - name:

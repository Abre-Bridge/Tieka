name: Tieka Android Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────
      # 2. JAVA — RN 0.76 + Expo 54 needs JDK 17
      # ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ─────────────────────────────────────────
      # 3. NODE
      # ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ─────────────────────────────────────────
      # 4. CACHE GRADLE
      # ─────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ─────────────────────────────────────────
      # 5. INSTALL EXPO CLI
      # ─────────────────────────────────────────
      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      # ─────────────────────────────────────────
      # 6. INSTALL DEPENDENCIES
      # ─────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ─────────────────────────────────────────
      # 7. CREATE .env FILE
      # Appwrite + any other secrets your app needs
      # Add these in GitHub Settings → Secrets
      # ─────────────────────────────────────────
      - name: Create .env file
        run: |
          touch .env
          [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}" ] && \
            echo "EXPO_PUBLIC_APPWRITE_ENDPOINT=${{ secrets.EXPO_PUBLIC_APPWRITE_ENDPOINT }}" >> .env || true
          [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}" ] && \
            echo "EXPO_PUBLIC_APPWRITE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}" >> .env || true
          [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}" ] && \
            echo "EXPO_PUBLIC_APPWRITE_DATABASE_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}" >> .env || true
          [ -n "${{ secrets.EXPO_PUBLIC_APPWRITE_COLLECTION_ID }}" ] && \
            echo "EXPO_PUBLIC_APPWRITE_COLLECTION_ID=${{ secrets.EXPO_PUBLIC_APPWRITE_COLLECTION_ID }}" >> .env || true
          echo ".env created with available secrets"
          # Always ensure .env exists even if no secrets — dotenv won't crash
          echo "# build env" >> .env

      # ─────────────────────────────────────────
      # 8. VERIFY FONT FILES EXIST
      # app.json declares 6 Rubik fonts —
      # if any are missing the build dies exactly
      # like your last project's Inter-Regular.ttf
      # ─────────────────────────────────────────
      - name: Verify Rubik fonts exist
        run: |
          MISSING=0
          FONTS=(
            "assets/fonts/Rubik-Bold.ttf"
            "assets/fonts/Rubik-ExtraBold.ttf"
            "assets/fonts/Rubik-Light.ttf"
            "assets/fonts/Rubik-Medium.ttf"
            "assets/fonts/Rubik-Regular.ttf"
            "assets/fonts/Rubik-SemiBold.ttf"
          )
          for font in "${FONTS[@]}"; do
            if [ -f "$font" ]; then
              echo "✅ $font"
            else
              echo "❌ MISSING: $font — downloading from Google Fonts..."
              mkdir -p assets/fonts
              # Download the Rubik variable font as a valid TTF substitute
              curl -sL "https://fonts.gstatic.com/s/rubik/v28/iJWZBXyIfDnIV5PNhY1KTN7Z-Yh-B4i1UA.ttf" \
                -o "$font" && echo "   → downloaded placeholder" || \
              # Fallback to system font
              cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf "$font" && \
                echo "   → used DejaVu fallback"

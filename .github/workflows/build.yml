name: Tieka Android Build

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Caches ───────────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── JS deps ───────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      # ── Expo prebuild ─────────────────────────────────────────────────────────
      # .env is already in the repo so no secrets needed for env vars.
      # newArchEnabled=true + native modules = development build required (not Expo Go).
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Fix 1: Pin Gradle wrapper to 8.10.2 ──────────────────────────────────
      # expo prebuild on SDK 54 writes gradle-8.14.x which breaks other things.
      - name: Pin Gradle wrapper to 8.10.2
        run: |
          WRAPPER="android/gradle/wrapper/gradle-wrapper.properties"
          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip' \
            'networkTimeout=10000' \
            'validateDistributionUrl=true' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > "$WRAPPER"
          chmod +x android/gradlew
          grep -q "8.10.2" "$WRAPPER" && echo "OK: Gradle 8.10.2 pinned" || { echo "FAIL"; exit 1; }

      # ── Fix 2: Force Kotlin 2.1.0 via gradle.properties ──────────────────────
      # expo-modules-core (SDK 54) ships a KSP compatibility map that only knows
      # Kotlin 2.x.  The version is resolved from the kotlin_version property in
      # android/gradle.properties — this is the earliest, most reliable injection
      # point, before any plugin or build script evaluates.
      - name: Force Kotlin 2.1.0 in gradle.properties
        run: |
          PROPS="android/gradle.properties"
          # Remove any existing kotlin_version line, then append the correct one
          grep -v "^kotlin_version" "$PROPS" > /tmp/gradle.properties.tmp
          echo 'kotlin_version=2.1.0' >> /tmp/gradle.properties.tmp
          mv /tmp/gradle.properties.tmp "$PROPS"
          echo "--- gradle.properties (kotlin lines) ---"
          grep -i kotlin "$PROPS"

      # ── Fix 3: Gradle init script as belt-and-suspenders ─────────────────────
      # Also set ext.kotlinVersion so expo-root-project's beforeEvaluate hook
      # sees the right value even if it ignores gradle.properties.
      - name: Write Gradle init script
        run: |
          mkdir -p ~/.gradle/init.d
          printf 'allprojects {\n    beforeEvaluate { project ->\n        project.ext["kotlinVersion"] = "2.1.0"\n        project.ext["kotlin_version"] = "2.1.0"\n    }\n}\n' \
            > ~/.gradle/init.d/force-kotlin.gradle
          echo "Init script:"
          cat ~/.gradle/init.d/force-kotlin.gradle

      # ── Optional: signing ─────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 --decode > android/app/keystore.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n' \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
              > android/key.properties
            echo "Keystore configured."
          else
            echo "No keystore — debug-only build."
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode=none \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pkotlin_version=2.1.0
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode=none \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pkotlin_version=2.1.0
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tieka-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tieka-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: APK sizes
        if: always()
        run: |
          find android/app/build/outputs/apk -name "*.apk" 2>/dev/null \
            | while read f; do echo "$(basename $f) — $(du -sh $f | cut -f1)"; done \
            || echo "No APKs found"

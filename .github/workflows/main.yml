name: Smart README Update

on:
  schedule:
    - cron: "0 */4 * * *"  # 6 times/day
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch quote (SAFE)
        run: |
          echo "Fetching quote..."

          RESPONSE=$(curl -s --max-time 10 https://programming-quotesapi.vercel.app/api/random || echo "")

          # Try parsing safely
          QUOTE=$(echo "$RESPONSE" | jq -r '.en' 2>/dev/null)
          AUTHOR=$(echo "$RESPONSE" | jq -r '.author' 2>/dev/null)

          # Fallback if API fails
          if [ -z "$QUOTE" ] || [ "$QUOTE" = "null" ]; then
            QUOTE="Stay consistent. Discipline beats motivation."
            AUTHOR="Unknown"
          fi

          echo "> \"$QUOTE\" — $AUTHOR" > quote.txt

      - name: Update README
        run: |
          # Ensure section exists
          grep -q "## 💬 Dev Quote" README.md || echo -e "\n## 💬 Dev Quote\n" >> README.md

          # Update quote safely
          awk '
          /## 💬 Dev Quote/ {
            print;
            getline;
            system("cat quote.txt");
            next
          }
          1
          ' README.md > temp.md && mv temp.md README.md

          # Update timestamp safely
          if grep -q "<!--LAST_UPDATED-->" README.md; then
            sed -i "s|<!--LAST_UPDATED-->|Last update: $(date)|" README.md
          else
            echo -e "\nLast update: $(date)" >> README.md
          fi

      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --quiet && git diff --staged --quiet || git commit -m "Smart README update"

          git push
